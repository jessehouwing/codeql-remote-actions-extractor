name: 'Download CodeQL Actions Dependencies'
description: >
  Downloads remote composite actions and callable workflows into the directory
  structure expected by the CodeQL Actions extractor, enabling interprocedural
  analysis of third-party action internals.
author: 'Jesse Houwing'
branding:
  icon: download
  color: blue

inputs:
  token:
    description: >
      GitHub token with contents:read for fetching remote action/workflow source
      files. For private actions in other repos, use a PAT or GitHub App token
      with appropriate access.
    required: true
    default: ${{ github.token }}
  workflow-directory:
    description: Directory containing workflow files to scan
    required: false
    default: .github/workflows
  public-github-token:
    description: >
      GitHub token for public GitHub when running on GHES/EMU/DR. Used to look
      up actions not available on the local instance.
    required: false
    default: ''
  mode:
    description: >
      Operating mode. When set to "legacy", the action also writes the first
      encountered version of each composite action to the SHA-less path
      `.github/actions/external/{owner}/{repo}/[actionPath/]action.yml`. If a
      different version of the same action is also referenced, a warning is
      logged but processing continues.
    required: false
    default: ''

outputs:
  actions-count:
    description: Number of composite actions downloaded
  workflows-count:
    description: Number of callable workflows downloaded

runs:
  using: node22
  main: dist/index.js
